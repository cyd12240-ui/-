<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>朋友局德州扑克</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Lobby 屏幕 -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-box">
    <h1 class="game-title">🃏 朋友局</h1>
    <p class="game-subtitle">德州扑克</p>
    <div class="form-group">
      <input type="text" id="input-nickname" class="input" placeholder="你的昵称" maxlength="8">
    </div>
    <button id="btn-create-room" class="btn btn-primary">创建房间</button>
    <div class="divider"><span>或</span></div>
    <div class="form-group">
      <input type="text" id="input-room-code" class="input" placeholder="输入房间码" maxlength="4">
    </div>
    <button id="btn-join-room" class="btn btn-primary">加入房间</button>
    <div id="lobby-error" class="error-msg"></div>
  </div>
</div>

<!-- Room 屏幕 -->
<div id="screen-room" class="screen">
  <div class="room-header">
    <span>房间：<strong id="room-code-display">----</strong></span>
    <span id="room-code-tap" class="tap-hint">点此复制</span>
    <button id="btn-change-char" class="btn-change-char" title="更换角色">
      <img src="/assets/sprites/btn_change_char.png" alt="换角色">
    </button>
    <button id="btn-room-settings" class="btn-change-char" title="房间设置" style="right:60px;display:none">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div id="player-list" class="player-list">
    <!-- 由 JS 动态渲染 -->
  </div>
  <div class="room-footer">
    <button id="btn-ready" class="btn btn-primary">准备</button>
    <button id="btn-start-game" class="btn btn-secondary" style="display:none">开始游戏</button>
    <button id="btn-leave-room" class="btn btn-ghost">离开</button>
  </div>
</div>

<!-- 角色选择浮层（放在 screen-room 外部，避免 display 级联影响） -->
<div id="char-select-overlay" class="cov" style="display:none">
  <div class="cbx">
    <div class="cti">选择角色</div>
    <div class="cop">
      <div class="cot" data-avatar="0">
        <img class="cim" src="/assets/sprites/char_liubei.png" alt="刘备">
        <div class="cna">刘备</div>
        <div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="1">
        <img class="cim" src="/assets/sprites/char_xiaosha.png" alt="小杀">
        <div class="cna">小杀</div>
       <div class="cge">女</div>
      </div>
      <div class="cot" data-avatar="2">
        <img class="cim" src="/assets/sprites/char_zhangfei.png" alt="张飞">
        <div class="cna">张飞</div>
       <div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="3">
        <img class="cim" src="/assets/sprites/char_guanyu.png" alt="关羽">
        <div class="cna">关羽</div>
       <div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="4">
        <img class="cim" src="/assets/sprites/char_zhangchunhua.png" alt="张春华">
        <div class="cna">张春华</div>
        <div class="cge">女</div>
      </div>
    </div>
    <button id="btn-close-char-select" class="ccl">关闭</button>
  </div>
</div>

<!-- 房间设置浮层 -->
<div id="room-settings-overlay" class="cov" style="display:none">
  <div class="cbx">
    <div class="cti">游戏房间设置</div>
    <div class="settings-form">
      <label class="sfl">
        <span>小盲注</span>
        <input type="number" id="setting-sb" class="sfi" min="5" max="200" value="10">
      </label>
      <label class="sfl">
        <span>大盲注</span>
        <input type="number" id="setting-bb" class="sfi" min="10" max="400" value="20">
      </label>
      <label class="sfl">
        <span>初始积分</span>
        <input type="number" id="setting-score" class="sfi" min="100" max="6400" step="100" value="2000">
      </label>
      <label class="sfl">
        <span>最大玩家</span>
        <input type="number" id="setting-max" class="sfi" min="2" max="9" value="6">
      </label>
      <label class="sfl">
        <span>自动开始(秒)</span>
        <input type="number" id="setting-auto" class="sfi" min="0" max="30" value="3">
       <span class="sft">0=关闭</span>
      </label>
      <label class="sfl">
        <span>最大对局数</span>
        <input type="number" id="setting-hands" class="sfi" min="0" max="200" value="0">
        <span class="sft">0=不限制</span>
      </label>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button id="btn-save-settings" class="ccl" style="flex:1;background:#4ECDC4;">保存</button>
      <button id="btn-close-settings" class="ccl" style="flex:1;">关闭</button>
    </div>
  </div>
</div>

<!-- Game 屏幕 -->
<div id="screen-game" class="screen">
  <div id="game-canvas-container">
    
  </div>

  <!-- HTML Overlay（操作、信息、道具） -->
  <div id="game-overlay">
    <!-- 顶部信息条 -->
    <div id="game-top-bar">
      <span id="game-pot-display">奖池: 0</span>
      <span id="game-phase-display">等待中</span>
      <button id="btn-leave-game" class="btn-tiny">退出</button>
    </div>

    <!-- 行动历史 -->
    <div id="action-history">
      <div id="action-log"></div>
    </div>

    <!-- 底部操作区 -->
    <div id="action-bar" class="action-bar">
      <button class="btn-action" data-action="fold">弃牌</button>
      <button class="btn-action" data-action="check">过牌</button>
      <button class="btn-action" data-action="call">跟注</button>
      <div class="raise-group">
        <button id="btn-raise" class="btn-action" data-action="raise">加注</button>
        <input type="range" id="raise-slider" min="40" max="2000" step="10" value="40">
        <span id="raise-amount">40</span>
      </div>
      <button class="btn-action btn-allin" data-action="allin">All-in</button>
    </div>

    <!-- 道具栏 -->
    <div id="item-bar">
      <button id="btn-speech" class="btn-item" disabled>
        <img src="/assets/sprites/btn_speak.png" style="width:20px;height:20px;vertical-align:middle">
      </button>
      <button id="item-egg" class="btn-item" data-item="egg" disabled>
        <img src="/assets/sprites/egg.png" style="width:18px;height:18px;vertical-align:middle"> <span class="item-cost">-分</span>
      </button>
      <button id="item-egg-10" class="btn-item" data-item="egg" data-count="10" disabled>
        <img src="/assets/sprites/egg.png" style="width:18px;height:18px;vertical-align:middle">×10 <span class="item-cost">-10分</span>
      </button>
      <button id="item-flower" class="btn-item" data-item="flower" disabled>
        <img src="/assets/sprites/flower_icon.png" style="width:18px;height:18px;vertical-align:middle"> <span class="item-cost">-分</span>
      </button>
      <button id="item-flower-10" class="btn-item" data-item="flower" data-count="10" disabled>
        <img src="/assets/sprites/flower_icon.png" style="width:18px;height:18px;vertical-align:middle">×10 <span class="item-cost">-10分</span>
      </button>
      <div id="item-target-hint" class="item-target-hint" style="display:none">????...</div>
    </div>
    </div>
  </div>

  <!-- 目标选择遮罩 -->
  <div id="target-overlay" class="target-overlay" style="display:none">
    <div class="target-title">选择目标</div>
    <div id="target-list" class="target-list"></div>
    <button id="btn-cancel-target" class="btn btn-ghost">取消</button>
  </div>

  <!-- 牌型参考 -->
  <div id="hand-ref-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>牌型大小</h3>
      <ol>
        <li>皇家同花顺</li><li>同花顺</li><li>四条</li><li>葫芦</li>
        <li>同花</li><li>顺子</li><li>三条</li><li>两对</li>
        <li>一对</li><li>高牌</li>
      </ol>
      <button id="btn-close-ref" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>



<!-- 跳过动画按钮 -->
<button id="btn-skip-anim" class="btn-skip-anim" style="display:none">跳过 ▶</button>



<!-- 客户端 JS -->
<script src="/js/ws-client.js?v=1783474803"></script>
<script src="/js/game-client.js?v=1783474813"></script>
<script src="/js/renderer/pixi-setup.js?v=639190570835771853"></script>
<script src="/js/renderer/ui-overlay.js?v=1783474803"></script>
<script src="/js/prop-throw.js?v=1"></script>
<script src="/js/sound.js?v=1783474803"></script>
<script src="/js/main.js?v=1783474803"></script>
</body>
</html>
