<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>朋友局德州扑克</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Lobby - Liquid Glass -->
<div id="screen-lobby" class="screen active">
  <video class="lobby-video" autoplay muted loop playsinline>
    <source src="/assets/sprites/sgs.mp4" type="video/mp4">
  </video>
  <div class="lobby-bg-overlay"></div>
  <div class="lobby-stage">
    <div class="glass-card" id="glassCard">
      <div class="brand">
        <div class="brand-row">
          <span class="suit-red" style="font-size:24px;">&#9830;</span>
          <span>朋友局</span>
          <span class="suit-dark" style="font-size:24px;">&#9824;</span>
        </div>
        <div class="subtitle">德 州 扑 克</div>
      </div>

      <input id="input-nickname" class="glass-field slide from-left d1" type="text" placeholder="你的昵称" maxlength="8">
      <button id="btn-create-room" class="glass-btn slide from-right d2">创建房间</button>

      <div class="glass-divider">或</div>

      <input id="input-room-code" class="glass-field slide from-left d3" type="text" placeholder="房 间 码" maxlength="4">
      <button id="btn-join-room" class="glass-btn slide from-right d4">加入房间</button>

      <div id="lobby-error" class="glass-error"></div>
    </div>
  </div>
</div>
<!-- Room -->
<div id="screen-room" class="screen">
  <div class="room-header">
    <span>房间：<strong class="room-code-display" id="room-code-display">----</strong></span>
    <span id="room-code-tap" class="tap-hint">复制</span>
    <button id="btn-change-char" class="btn-change-char" title="更换角色">
      <img src="/assets/sprites/btn_change_char.png" alt="换角色">
    </button>
    <button id="btn-room-settings" class="btn-change-char" title="房间设置" style="right:60px;display:none">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
  <div id="player-list" class="player-list"></div>
  <div class="room-footer">
    <button id="btn-ready" class="btn btn-primary">准备</button>
    <button id="btn-start-game" class="btn btn-secondary" style="display:none">开始游戏</button>
    <button id="btn-leave-room" class="btn btn-ghost">离开</button>
  </div>
</div>

<!-- 角色选择 -->
<div id="char-select-overlay" class="cov" style="display:none">
  <div class="cbx">
    <div class="cti">选择角色</div>
    <div class="cop">
      <div class="cot" data-avatar="0">
        <img class="cim" src="/assets/sprites/char_liubei.png" alt="刘备"><div class="cna">刘备</div><div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="1">
        <img class="cim" src="/assets/sprites/char_xiaosha.png" alt="小杀"><div class="cna">小杀</div><div class="cge">女</div>
      </div>
      <div class="cot" data-avatar="2">
        <img class="cim" src="/assets/sprites/char_zhangfei.png" alt="张飞"><div class="cna">张飞</div><div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="3">
        <img class="cim" src="/assets/sprites/char_guanyu.png" alt="关羽"><div class="cna">关羽</div><div class="cge">男</div>
      </div>
      <div class="cot" data-avatar="4">
        <img class="cim" src="/assets/sprites/char_zhangchunhua.png" alt="张春华"><div class="cna">张春华</div><div class="cge">女</div>
      </div>
    </div>
    <button id="btn-close-char-select" class="ccl">关闭</button>
  </div>
</div>

<!-- 房间设置 -->
<div id="room-settings-overlay" class="cov" style="display:none">
  <div class="cbx">
    <div class="cti">游戏房间设置</div>
    <div class="settings-form">
      <label class="sfl"><span>小盲注</span><input type="number" id="setting-sb" class="sfi" min="5" max="200" value="10"></label>
      <label class="sfl"><span>大盲注</span><input type="number" id="setting-bb" class="sfi" min="10" max="400" value="20"></label>
      <label class="sfl"><span>初始积分</span><input type="number" id="setting-score" class="sfi" min="100" max="6400" step="100" value="2000"></label>
      <label class="sfl"><span>最大玩家</span><input type="number" id="setting-max" class="sfi" min="2" max="9" value="6"></label>
      <label class="sfl"><span>自动开始(秒)</span><input type="number" id="setting-auto" class="sfi" min="0" max="30" value="3"><span class="sft">0=关闭</span></label>
      <label class="sfl"><span>最大局数</span><input type="number" id="setting-hands" class="sfi" min="0" max="200" value="0"><span class="sft">0=不限</span></label>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button id="btn-save-settings" class="ccl" style="flex:1;background:var(--accent-cool);">保存</button>
      <button id="btn-close-settings" class="ccl" style="flex:1;">关闭</button>
    </div>
  </div>
</div>

<!-- Game -->
<div id="screen-game" class="screen">
  <div id="game-canvas-container"></div>

  <div id="game-overlay">
    <div id="game-top-bar">
      <span id="game-pot-display">奖池: 0</span>
      <span id="game-phase-display">等待中</span>
      <button id="btn-leave-game" class="btn-tiny">退出</button>
    </div>

    <div id="action-history">
      <div id="action-log"></div>
    </div>

    <div id="action-bar" class="action-bar">
      <button class="btn-action" data-action="fold">弃牌</button>
      <button class="btn-action" data-action="check">过牌</button>
      <button class="btn-action" data-action="call">跟注</button>
      <div class="raise-group">
        <button id="btn-raise" class="btn-action" data-action="raise">加注</button>
        <input type="range" id="raise-slider" min="40" max="2000" step="10" value="40">
        <span id="raise-amount">40</span>
      </div>
      <button class="btn-action btn-allin" data-action="allin">All-in</button>
    </div>

    <div id="item-bar">
      <button id="btn-speech" class="btn-item" disabled>
        <img src="/assets/sprites/btn_speak.png" style="width:20px;height:20px;display:block">
      </button>
      <div id="item-target-hint" class="item-target-hint" style="display:none">选择一个目标...</div>
    </div>
  </div>

  <div id="target-overlay" class="target-overlay" style="display:none">
    <div class="target-title">选择目标</div>
    <div id="target-list" class="target-list"></div>
    <button id="btn-cancel-target" class="btn btn-ghost" style="width:auto;padding:10px 32px;">取消</button>
  </div>

  <div id="hand-ref-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>牌型大小</h3>
      <ol>
        <li>皇家同花顺</li><li>同花顺</li><li>四条</li><li>葫芦</li>
        <li>同花</li><li>顺子</li><li>三条</li><li>两对</li>
        <li>一对</li><li>高牌</li>
      </ol>
      <button id="btn-close-ref" class="btn btn-primary">关闭</button>
    </div>
  </div>
</div>

<button id="btn-skip-anim" class="btn-skip-anim" style="display:none">跳过 &blacktriangleright;</button>

 <script src="/js/ws-client.js"></script>
 <script src="/js/renderer/pixi-setup.js"></script>
 <script src="/js/renderer/table.js"></script>
 <script src="/js/renderer/cards.js"></script>
 <script src="/js/renderer/avatars.js"></script>
 <script src="/js/renderer/items.js"></script>
 <script src="/js/renderer/ui-overlay.js"></script>
 <script src="/js/screen.js"></script>
 <script src="/js/room-ui.js"></script>
 <script src="/js/game-ui.js"></script>
 <script src="/js/item-system.js"></script>
 <script src="/js/sound.js"></script>
 <script src="/js/game-client.js"></script>
 <script src="/js/main.js"></script>
</body>
</html>
